<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>100층 계단 온라인</title>
  <meta name="description" content="친구와 실시간으로 계단을 오르고, 숨었다가 기습하며 랭킹을 겨루는 웹 멀티플레이 계단 배틀 게임입니다. 설치 없이 브라우저에서 바로 플레이하세요.">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="100층 계단 온라인">
  <meta property="og:description" content="숨고, 따라잡고, 떨어뜨리는 실시간 웹 계단 배틀 게임. 친구와 링크로 바로 플레이하세요.">
  <meta property="og:site_name" content="100층 계단 온라인">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="100층 계단 온라인">
  <meta name="twitter:description" content="친구와 실시간으로 계단을 오르고 기습하는 웹 멀티플레이 게임입니다.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: rgba(22, 25, 32, 0.88);
      --panel-solid: #191d25;
      --line: rgba(255, 255, 255, 0.14);
      --text: #f5f1e8;
      --muted: #aeb6c4;
      --bar: #586271;
      --bar-active: #f0bd5b;
      --player: #ff646f;
      --bot: #72b7ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background:
        linear-gradient(180deg, #191c23 0%, #101218 68%, #0c0e13 100%);
    }

    .screen {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 50% 25%, rgba(240, 189, 91, 0.16), transparent 28%),
        rgba(10, 12, 16, 0.8);
      z-index: 10;
    }

    .screen.hidden {
      display: none;
    }

    .join-card {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(25, 29, 37, 0.96);
      padding: 22px;
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.42);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: 0;
    }

    .sub {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #11141a;
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--bar-active);
    }

    .start-btn {
      width: 100%;
      height: 46px;
      margin-top: 18px;
      border: 0;
      border-radius: 8px;
      background: var(--bar-active);
      color: #17110a;
      font-weight: 900;
      cursor: pointer;
    }

    .start-btn:active {
      transform: translateY(1px);
    }

    .hud {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(198px, 260px) minmax(180px, 1fr) minmax(260px, 420px);
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 10px 14px;
      padding: 14px;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .top-left,
    .idle-timer,
    .ranking,
    .chat,
    .item-bar,
    .notice {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(8px);
    }

    .top-left {
      grid-column: 1;
      grid-row: 1;
      width: 100%;
      min-width: 0;
      padding: 12px;
    }

    .floor {
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
    }

    .combo {
      position: fixed;
      left: min(calc(50% + 180px), calc(100vw - 180px));
      top: 58%;
      right: auto;
      bottom: auto;
      display: block;
      min-width: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--bar-active);
      box-shadow: none;
      backdrop-filter: none;
      text-shadow: 0 0 18px rgba(240, 189, 91, 0.48), 0 2px 10px rgba(0, 0, 0, 0.74);
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      transform: translate(18px, 10px) scale(0.94);
      transition: opacity 260ms ease, transform 260ms ease;
    }

    .combo.active {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }

    .idle-timer {
      grid-column: 2;
      grid-row: 1;
      place-self: start center;
      min-width: 128px;
      padding: 9px 14px;
      text-align: center;
      font-weight: 900;
      color: var(--text);
      pointer-events: none;
    }

    .idle-timer.danger {
      color: #ffdd9a;
      border-color: rgba(255, 116, 94, 0.54);
      box-shadow: 0 0 24px rgba(255, 116, 94, 0.18);
    }

    .idle-label {
      display: block;
      font-size: 10px;
      color: var(--muted);
      line-height: 1;
      margin-bottom: 4px;
    }

    .idle-value {
      display: block;
      font-size: 20px;
      line-height: 1;
    }

    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .next-goal {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .next-goal span {
      display: block;
      margin-top: 3px;
      color: var(--bar-active);
      font-size: 11px;
    }

    .boost-btn {
      pointer-events: auto;
      width: 100%;
      min-height: 34px;
      margin-top: 10px;
      border: 1px solid rgba(240, 189, 91, 0.42);
      border-radius: 8px;
      background: rgba(240, 189, 91, 0.16);
      color: var(--bar-active);
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .boost-btn:disabled {
      cursor: not-allowed;
      color: var(--muted);
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.05);
      opacity: 0.78;
    }

    .auto-btn {
      pointer-events: auto;
      width: 100%;
      min-height: 30px;
      margin-top: 6px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .auto-btn.active {
      border-color: rgba(77, 216, 166, 0.62);
      background: rgba(77, 216, 166, 0.18);
      color: #9ff2cf;
    }

    .boost-main,
    .boost-cost {
      display: block;
    }

    .boost-cost {
      color: var(--muted);
      font-size: 0.85em;
      font-weight: 800;
    }

    .inventory {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .item-bar {
      grid-column: 1;
      grid-row: 2;
      width: 100%;
      min-width: 0;
      padding: 10px;
    }

    .item-slot {
      min-width: 0;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #11141a;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 7px;
      padding: 0 10px;
      font-size: 14px;
      font-weight: 900;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .item-slot.ready {
      color: var(--text);
      border-color: rgba(240, 189, 91, 0.52);
      background: rgba(240, 189, 91, 0.14);
      box-shadow: inset 0 0 0 1px rgba(240, 189, 91, 0.18);
    }

    .item-key {
      color: var(--bar-active);
      display: inline-grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: rgba(240, 189, 91, 0.16);
      flex: 0 0 auto;
    }

    .item-short {
      display: none;
    }

    .ranking {
      grid-column: 3;
      grid-row: 1 / 3;
      width: 100%;
      min-width: 0;
      overflow: hidden;
      padding: 12px;
    }

    .ranking.collapsed {
      width: auto;
      justify-self: end;
      padding: 8px;
    }

    .ranking.collapsed .rank-content {
      display: none;
    }

    .ranking.collapsed .panel-title {
      margin: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .panel-title {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .panel-toggle {
      pointer-events: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #11141a;
      color: var(--text);
      width: 28px;
      min-width: 28px;
      height: 24px;
      padding: 0;
      cursor: pointer;
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
    }

    .panel-toggle:hover {
      border-color: rgba(240, 189, 91, 0.48);
      color: var(--bar-active);
    }

    .rank-head,
    .rank-row {
      display: grid;
      grid-template-columns: 28px minmax(40px, 1fr) 34px 46px 64px;
      gap: 6px;
      align-items: center;
      min-height: 28px;
      font-size: 13px;
    }

    .rank-head {
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      margin-bottom: 4px;
      padding-bottom: 4px;
      font-weight: 800;
    }

    .rank-row {
      border-top: 1px solid rgba(255, 255, 255, 0.07);
    }

    .rank-row:first-of-type {
      border-top: 0;
    }

    .rank-content {
      max-height: min(34vh, 310px);
      overflow: auto;
    }

    .live-leader {
      margin-bottom: 6px;
      padding: 5px 0;
      color: var(--bar-active);
      font-size: 12px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rank-id {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
    }

    .rank-floor {
      color: var(--bar-active);
      text-align: right;
      font-weight: 900;
    }

    .rank-time {
      color: var(--muted);
      text-align: right;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }

    .chat {
      grid-column: 3;
      grid-row: 4;
      width: 100%;
      min-width: 0;
      height: clamp(180px, 28vh, 246px);
      display: flex;
      flex-direction: column;
      padding: 12px;
      pointer-events: auto;
    }

    .chat-log {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 4px;
      font-size: 13px;
    }

    .chat-row {
      line-height: 1.35;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .chat-name {
      color: var(--bar-active);
      font-weight: 900;
    }

    .chat form {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .chat input {
      height: 38px;
    }

    .chat button {
      width: 58px;
      border: 0;
      border-radius: 8px;
      background: #303744;
      color: var(--text);
      font-weight: 900;
      cursor: pointer;
    }

    .notice {
      grid-column: 1;
      grid-row: 4;
      align-self: end;
      width: 100%;
      min-width: 0;
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .notice strong {
      color: var(--text);
    }

    .mobile-controls {
      position: fixed;
      left: 50%;
      right: auto;
      top: auto;
      bottom: 12vh;
      display: none;
      width: min(92vw, 282px);
      grid-template-columns: 1fr;
      justify-items: center;
      gap: 0;
      padding: 12px max(12px, env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      pointer-events: none;
      z-index: 5;
      transform: translateX(-50%);
    }

    .mobile-pad {
      display: grid;
      gap: 8px;
      pointer-events: auto;
      touch-action: none;
    }

    .mobile-pad {
      grid-template-columns: repeat(3, 72px);
      grid-template-rows: repeat(2, 64px);
      align-content: end;
      justify-content: start;
    }

    .mobile-btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(25, 29, 37, 0.54);
      color: var(--text);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28);
      min-width: 0;
      min-height: 64px;
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .mobile-btn:active {
      transform: translateY(1px) scale(0.98);
      border-color: rgba(240, 189, 91, 0.64);
      background: rgba(240, 189, 91, 0.2);
      color: var(--bar-active);
    }

    .mobile-btn.up {
      grid-column: 2;
      grid-row: 1;
    }

    .mobile-btn.left {
      grid-column: 1;
      grid-row: 2;
    }

    .mobile-btn.hide {
      grid-column: 2;
      grid-row: 2;
      font-size: 13px;
    }

    .mobile-btn.right {
      grid-column: 3;
      grid-row: 2;
    }

    .mobile-idle-bar {
      display: none;
      width: min(216px, 78vw);
      height: 8px;
      margin-top: 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(25, 29, 37, 0.58);
      overflow: hidden;
      pointer-events: none;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.24);
    }

    .mobile-idle-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #4dd8a6, #f0bd5b, #ff745e);
      transition: width 90ms linear;
    }

    @media (max-width: 760px) {
      #game {
        height: 100dvh;
      }

      .hud {
        display: block;
        padding: 0;
        overflow: visible;
      }

      .top-left {
        position: fixed;
        top: max(8px, env(safe-area-inset-top));
        left: max(8px, env(safe-area-inset-left));
        right: auto;
        width: min(38vw, 132px);
        display: block;
        padding: 8px;
        border-color: rgba(255, 255, 255, 0.08);
        background: rgba(18, 21, 28, 0.58);
      }

      .floor {
        font-size: 27px;
        margin-bottom: 7px;
      }

      .meta {
        display: grid;
        grid-template-columns: 1fr;
        margin-top: 0;
        gap: 4px;
        font-size: 10px;
        line-height: 1.1;
      }

      .meta span {
        display: flex;
        justify-content: space-between;
        gap: 5px;
        min-width: 0;
        padding: 3px 5px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.05);
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      #block,
      #onlineStatus {
        display: none;
      }

      .boost-btn {
        width: 72px;
        min-height: 38px;
        margin-top: 6px;
        padding: 4px 5px;
        font-size: 10px;
        line-height: 1.05;
        text-align: center;
      }

      .auto-btn {
        width: 72px;
        min-height: 32px;
        margin-top: 5px;
        padding: 4px 5px;
        font-size: 10px;
      }

      .boost-main {
        display: block;
        font-size: 11px;
        font-weight: 900;
      }

      .boost-cost {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 9px;
        font-weight: 800;
      }

      .ranking {
        position: fixed;
        top: max(8px, env(safe-area-inset-top));
        right: max(8px, env(safe-area-inset-right));
        width: min(54vw, 220px);
        max-height: 152px;
        padding: 0;
        border: 0;
        background: transparent;
        backdrop-filter: none;
      }

      .ranking.collapsed {
        width: min(54vw, 220px);
        max-height: 152px;
      }

      .ranking.collapsed .rank-content {
        display: block;
      }

      .panel-header {
        margin-bottom: 4px;
      }

      .ranking .panel-toggle {
        display: none;
      }

      .ranking .panel-title {
        font-size: 10px;
        text-align: right;
        text-shadow: 0 1px 5px rgba(0, 0, 0, 0.72);
      }

      .rank-content {
        max-height: 124px;
        overflow: hidden;
      }

      .rank-head {
        display: none;
      }

      .rank-row {
        grid-template-columns: 18px minmax(0, 1fr) 24px 34px 48px;
        gap: 4px;
        min-height: 22px;
        font-size: 10px;
        border-top-color: rgba(255, 255, 255, 0.05);
        text-shadow: 0 1px 5px rgba(0, 0, 0, 0.82);
      }

      .rank-row:nth-child(n+6) {
        display: none;
      }

      .combo {
        left: auto;
        top: auto;
        right: 14px;
        bottom: calc(12vh + 150px + env(safe-area-inset-bottom));
        font-size: 19px;
      }

      .idle-timer {
        display: none;
      }

      .mobile-idle-bar {
        display: block;
      }

      .item-bar {
        position: fixed;
        left: max(8px, env(safe-area-inset-left));
        right: auto;
        top: 50%;
        bottom: auto;
        width: min(17vw, 68px);
        padding: 6px;
        transform: translateY(-50%);
      }

      .item-bar .panel-title {
        display: none;
      }

      .inventory {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .meta,
      .rank-head,
      .rank-row,
      .chat-log,
      .notice {
        font-size: 12px;
      }

      .rank-head,
      .rank-row {
        grid-template-columns: 18px minmax(0, 1fr) 24px 34px 48px;
        gap: 5px;
      }

      .item-slot {
        height: 42px;
        justify-content: center;
        padding: 0 4px;
        font-size: 10px;
        flex-direction: column;
        gap: 2px;
        cursor: pointer;
        pointer-events: auto;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      .item-name {
        display: none;
      }

      .item-short {
        display: block;
        width: 100%;
        overflow: hidden;
        text-align: center;
        color: var(--text);
        font-size: 9px;
        line-height: 1;
        white-space: nowrap;
      }

      .item-slot:active {
        transform: translateY(1px) scale(0.99);
        border-color: rgba(240, 189, 91, 0.68);
      }

      .item-key {
        width: 18px;
        height: 18px;
      }

      .chat {
        position: fixed;
        left: max(8px, env(safe-area-inset-left));
        right: max(8px, env(safe-area-inset-right));
        bottom: max(8px, env(safe-area-inset-bottom));
        width: auto;
        height: 34px;
        display: flex;
        flex-direction: column;
        padding: 7px 9px;
        pointer-events: auto;
      }

      .chat .panel-title {
        display: none;
      }

      .chat-log {
        flex: 1 1 auto;
        min-height: 0;
        font-size: 11px;
        gap: 0;
        padding-right: 0;
        overflow: hidden;
      }

      .chat-row {
        display: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.45;
      }

      .chat-row:last-child {
        display: block;
      }

      .chat form {
        display: none;
      }

      .chat.expanded {
        height: min(34vh, 210px);
        padding: 9px;
      }

      .chat.expanded .chat-log {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding-right: 4px;
      }

      .chat.expanded .chat-row {
        display: block;
        white-space: normal;
      }

      .chat.expanded form {
        display: flex;
        flex: 0 0 auto;
        margin-top: 8px;
      }

      .chat input {
        height: 34px;
      }

      .chat button {
        width: 48px;
        font-size: 12px;
      }

      .top-left .meta {
        font-size: 10px;
