  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const joinScreen = document.getElementById("joinScreen");
    const joinForm = document.getElementById("joinForm");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const ui = {
      floor: document.getElementById("floor"),
      idleTimer: document.getElementById("idleTimer"),
      combo: document.getElementById("combo"),
      playerLabel: document.getElementById("playerLabel"),
      block: document.getElementById("block"),
      cooldown: document.getElementById("cooldown"),
      kills: document.getElementById("kills"),
      gold: document.getElementById("gold"),
      lives: document.getElementById("lives"),
      onlineStatus: document.getElementById("onlineStatus"),
      nextGoal: document.getElementById("nextGoal"),
      boostBtn: document.getElementById("boostBtn"),
      autoBtn: document.getElementById("autoBtn"),
      mobileIdleFill: document.getElementById("mobileIdleFill"),
      itemSlots: [
        document.getElementById("item0"),
        document.getElementById("item1"),
        document.getElementById("item2")
      ],
      rankingPanel: document.getElementById("rankingPanel"),
      rankToggle: document.getElementById("rankToggle"),
      rankingTitle: document.getElementById("rankingTitle"),
      liveLeader: document.getElementById("liveLeader"),
      rankRows: document.getElementById("rankRows"),
      chatPanel: document.getElementById("chatPanel"),
      chatLog: document.getElementById("chatLog"),
      notice: document.getElementById("notice")
    };

    const SEGMENT_SIZE = 100;
    const HIDE_COOLDOWN = 10 * 60 * 1000;
    const GLOBAL_SEED = "one-public-stair-map-v3";
    const STEP_X = 72;
    const STEP_Y = 38;
    const BAR_W = 68;
    const BAR_H = 14;
    const REST_INTERVAL = 500;
    const COMBO_TIMEOUT = 3000;
    const SHIELD_DURATION = 5000;
    const LIFE_REWARD_INTERVAL = 250;
    const FLOOR_IDLE_START = 3000;
    const FLOOR_IDLE_END = 1500;
    const FLOOR_IDLE_MAX_FLOOR = 10000;
    const BOULDER_STUN = 1000;
    const MISSILE_STUN = 3000;
    const MISSILE_DURATION = 1800;
    const MISSILE_HIT_AT = 0.9;
    const KILL_GOLD_REWARD = 50;
    const COMBO_GOLD_STEP = 30;
    const COMBO_GOLD_REWARD = 10;
    const COMBO_ITEM_STEP = 50;
    const JUMP_DURATION = 240;
    const AUTO_CLIMB_INTERVAL = 260;
    const BOT_FILLER_COUNT = 5;
    const BOT_REMOVE_POPULATION = 10;
    const PROFILE_KEY = "stairProfile";
    const PLAYER_KEY = "stairPlayerKey";
    const BOT_DATA = [
      ["NOVA", "US"],
      ["MIN", "KR"],
      ["JIN", "JP"],
      ["SOL", "BR"],
      ["KAI", "DE"],
      ["LUNA", "FR"],
      ["AXEL", "GB"],
      ["MIA", "CA"],
      ["RIO", "AU"],
      ["TAN", "CN"],
      ["YUI", "JP"]
    ];
    const ITEMS = [
      { type: "boulder", name: "낙석", short: "ROCK" },
      { type: "warp", name: "워프", short: "WARP" },
      { type: "shield", name: "보호막", short: "SHLD" },
      { type: "hideReset", name: "쿨초기화", short: "HIDE" },
      { type: "missile", name: "미사일", short: "MSL" }
    ];
    const FOOTSTEP_SOUND_URL = "";
    const footstepPool = FOOTSTEP_SOUND_URL ? Array.from({ length: 4 }, () => {
      const audio = new Audio(FOOTSTEP_SOUND_URL);
      audio.preload = "auto";
      audio.volume = 0.72;
      return audio;
    }) : [];
    let footstepIndex = 0;
    let audioContext = null;
    let footstepSampleAvailable = Boolean(FOOTSTEP_SOUND_URL);

    const state = {
      mode: "join",
      player: { id: "", country: "KR", floor: 0, bestFloor: 0, hidden: false, shield: false, shieldUntil: 0, stunnedUntil: 0 },
      bots: [],
      generated: new Map(),
      positions: [{ x: 0, y: 0 }],
      inventory: [null, null, null],
      testItemCursor: 0,
      rewardedMilestones: new Set(),
      rankingCollapsed: sessionStorage.getItem("rankingCollapsed") === "true",
      lastHideAt: -HIDE_COOLDOWN,
      noticeUntil: 0,
      noticeText: "ID를 만들고 게임을 시작하세요.",
      combo: 0,
      comboLastInputAt: 0,
      floorHold: { floor: 0, since: 0, punished: false },
      runStartedAt: Date.now(),
      bestTimeMs: 0,
      autoClimb: false,
      autoTimer: 0,
      kills: 0,
      gold: 0,
      lives: 0,
      rewardedLifeMilestones: new Set(),
      remotePlayers: [],
      leaderboard: [],
      serverPopulation: 1,
      online: {
        enabled: location.protocol === "http:" || location.protocol === "https:",
        connected: false,
        onlineId: "",
        playerKey: "",
        events: null,
        syncTimer: 0
      },
      chat: [
        { id: "SYSTEM", country: "--", text: "채팅창이 준비되었습니다." }
      ],
      flash: 0,
      shake: 0,
      climbFlash: { floor: -1, start: 0, duration: 0 },
      jump: { start: 0, duration: 0 },
      trails: [],
      effects: [],
    };

    function flagEmoji(country) {
      const code = String(country || "").trim().toUpperCase();
      if (!/^[A-Z]{2}$/.test(code)) return "🏳";
      return code.replace(/./g, (char) => String.fromCodePoint(127397 + char.charCodeAt(0)));
    }

    function displayName(player) {
      if (!player || !player.id) return "ID 없음";
      const title = titleForFloor(Math.max(Number(player.bestFloor || 0), Number(player.floor || 0)));
      return `${title ? `${title} ` : ""}${flagEmoji(player.country)} ${player.id}`;
    }

    function titleForFloor(floor) {
      if (floor >= 3000) return "건휘친구";
      if (floor >= 1500) return "점육점";
      if (floor >= 1000) return "까망이";
      if (floor >= 500) return "누랭이";
      return "";
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function getPlayerKey() {
      let key = localStorage.getItem(PLAYER_KEY);
      if (!key) {
        key = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}_${Math.random().toString(16).slice(2)}`;
        localStorage.setItem(PLAYER_KEY, key);
      }
      return key;
    }

    function itemFromType(type) {
      return ITEMS.find((item) => item.type === type) || null;
    }

    function saveSessionProfile() {
      if (!state.player.id) return;
      sessionStorage.setItem(PROFILE_KEY, JSON.stringify({
        id: state.player.id,
        country: state.player.country,
        floor: state.player.floor,
        bestFloor: state.player.bestFloor,
        hidden: state.player.hidden,
        shield: state.player.shield,
        shieldUntil: state.player.shieldUntil,
        stunnedUntil: state.player.stunnedUntil,
        runStartedAt: state.runStartedAt,
        bestTimeMs: state.bestTimeMs,
        lastHideAt: state.lastHideAt,
        inventory: state.inventory.map((item) => item ? item.type : null),
        testItemCursor: state.testItemCursor,
        kills: state.kills,
        gold: state.gold,
        lives: state.lives,
        rewardedMilestones: [...state.rewardedMilestones],
        rewardedLifeMilestones: [...state.rewardedLifeMilestones],
        playerKey: state.online.playerKey,
        onlineId: state.online.onlineId
      }));
    }

    function hashString(text) {
      let h = 2166136261;
      for (let i = 0; i < text.length; i++) {
        h ^= text.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function mulberry32(seed) {
      return function random() {
        seed |= 0;
        seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function segmentDirections(segment) {
      if (state.generated.has(segment)) return state.generated.get(segment);
      const random = mulberry32(hashString(`${GLOBAL_SEED}:${segment}`));
      const dirs = [];
      const patterns = [
        { name: "left-run", min: 5, max: 12, weights: { L: 0.74, U: 0.16, R: 0.10 } },
        { name: "right-run", min: 5, max: 12, weights: { L: 0.10, U: 0.16, R: 0.74 } },
        { name: "vertical", min: 4, max: 9, weights: { L: 0.18, U: 0.64, R: 0.18 } },
        { name: "zigzag", min: 6, max: 14, weights: { L: 0.45, U: 0.10, R: 0.45 }, alternate: true },
        { name: "drift-left", min: 8, max: 16, weights: { L: 0.56, U: 0.30, R: 0.14 } },
        { name: "drift-right", min: 8, max: 16, weights: { L: 0.14, U: 0.30, R: 0.56 } }
      ];
      let x = 0;
      let last = "U";
      let lastSide = random() < 0.5 ? "L" : "R";

      function pickDirection(pattern) {
        if (pattern.alternate) {
          lastSide = lastSide === "L" ? "R" : "L";
          return random() < 0.18 ? "U" : lastSide;
        }
        const weights = { ...pattern.weights };
        if (x < -8) weights.R += 0.38;
        if (x > 8) weights.L += 0.38;
        if (last === "L") weights.L *= 1.14;
        if (last === "R") weights.R *= 1.14;
        const total = weights.L + weights.U + weights.R;
        const roll = random() * total;
        if (roll < weights.L) return "L";
        if (roll < weights.L + weights.U) return "U";
        return "R";
      }

      while (dirs.length < SEGMENT_SIZE) {
        const pattern = patterns[Math.floor(random() * patterns.length)];
        const length = pattern.min + Math.floor(random() * (pattern.max - pattern.min + 1));
        for (let i = 0; i < length && dirs.length < SEGMENT_SIZE; i++) {
          const dir = pickDirection(pattern);
          dirs.push(dir);
          x += dir === "L" ? -1 : dir === "R" ? 1 : 0;
          last = dir;
        }
      }

      state.generated.set(segment, dirs);
      return dirs;
    }

    function directionForNextFloor(floor) {
      const segment = Math.floor(floor / SEGMENT_SIZE);
      return segmentDirections(segment)[floor % SEGMENT_SIZE];
    }

    function isRestFloor(floor) {
      return floor > 0 && floor % REST_INTERVAL === 0;
    }

    function stairPosition(floor) {
      while (state.positions.length <= floor) {
        const prevFloor = state.positions.length - 1;
        const prev = state.positions[prevFloor];
        const dir = directionForNextFloor(prevFloor);
        const dx = dir === "L" ? -1 : dir === "R" ? 1 : 0;
        state.positions.push({ x: prev.x + dx, y: prevFloor + 1 });
      }
      return state.positions[floor];
    }

    function resetBots(count = BOT_FILLER_COUNT) {
      const now = performance.now();
      state.bots = BOT_DATA.slice(0, count).map(([id, country], i) => ({
        id: `EASY ${id}`,
        country,
        floor: 4 + i * 4,
        bestFloor: 4 + i * 4,
        easy: true,
        hidden: false,
        shield: false,
        shieldUntil: 0,
        nextMoveAt: now + 900 + Math.random() * 1300,
        baseSpeed: 860 + Math.random() * 740,
        rhythm: 0.92 + Math.random() * 0.82,
        hesitation: 0.12 + Math.random() * 0.16,
        mistake: 0.04 + Math.random() * 0.055,
        inventory: [],
        nextItemAt: Number.POSITIVE_INFINITY,
        jump: { start: 0, duration: 0 },
        stunnedUntil: 0
      }));
    }

    function ensureBotCount(count) {
      if (state.bots.length >= count) return;
      const existing = state.bots.length;
      const now = performance.now();
      for (let i = existing; i < count; i++) {
        const [id, country] = BOT_DATA[i % BOT_DATA.length];
        const floor = 4 + i * 4;
        state.bots.push({
          id: i < BOT_DATA.length ? `EASY ${id}` : `EASY ${id}${i + 1}`,
          country,
          floor,
          bestFloor: floor,
          easy: true,
          hidden: false,
          shield: false,
          shieldUntil: 0,
          nextMoveAt: now + 900 + Math.random() * 1300,
          baseSpeed: 860 + Math.random() * 740,
          rhythm: 0.92 + Math.random() * 0.82,
          hesitation: 0.12 + Math.random() * 0.16,
          mistake: 0.04 + Math.random() * 0.055,
          inventory: [],
          nextItemAt: Number.POSITIVE_INFINITY,
          jump: { start: 0, duration: 0 },
          stunnedUntil: 0
        });
      }
    }

    function resize() {
      const ratio = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(1, Math.floor(rect.width * ratio));
      canvas.height = Math.max(1, Math.floor(rect.height * ratio));
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function showNotice(text) {
      state.noticeText = text;
      state.noticeUntil = performance.now() + 2600;
      ui.notice.innerHTML = `<strong>알림</strong><br>${escapeHtml(text)}`;
    }

    function playFootstep() {
      footstepIndex += 1;
      if (!footstepSampleAvailable) {
        playSyntheticFootstep();
        return;
      }
      const audio = footstepPool[footstepIndex % footstepPool.length];
      audio.currentTime = 0;
      audio.play().catch(() => {
        footstepSampleAvailable = false;
        playSyntheticFootstep();
      });
    }

    function playSyntheticFootstep() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      audioContext = audioContext || new AudioContext();
      if (audioContext.state === "suspended") audioContext.resume();
      const now = audioContext.currentTime;
      const thump = audioContext.createOscillator();
      const noise = audioContext.createBufferSource();
      const filter = audioContext.createBiquadFilter();
      const thumpGain = audioContext.createGain();
      const noiseGain = audioContext.createGain();
      const mix = audioContext.createGain();

      thump.type = "triangle";
      thump.frequency.setValueAtTime(130 + Math.random() * 26, now);
      thump.frequency.exponentialRampToValueAtTime(58, now + 0.085);
      thumpGain.gain.setValueAtTime(0.0001, now);
      thumpGain.gain.exponentialRampToValueAtTime(0.16, now + 0.008);
      thumpGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);

      const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.08, audioContext.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      }
      noise.buffer = buffer;
      filter.type = "bandpass";
      filter.frequency.value = 780;
      filter.Q.value = 0.9;
      noiseGain.gain.setValueAtTime(0.0001, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.045, now + 0.006);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.075);
      mix.gain.value = 0.72;

      thump.connect(thumpGain).connect(mix);
      noise.connect(filter).connect(noiseGain).connect(mix);
      mix.connect(audioContext.destination);
      thump.start(now);
      thump.stop(now + 0.13);
      noise.start(now);
      noise.stop(now + 0.085);
    }

    function addChat(id, country, text) {
      state.chat.push({ id, country, text });
      state.chat = state.chat.slice(-40);
      renderChat();
    }

    function renderChat() {
      ui.chatLog.innerHTML = state.chat.map((row) => (
        `<div class="chat-row"><span class="chat-name">[${escapeHtml(row.country)}] ${escapeHtml(row.id)}</span> ${escapeHtml(row.text)}</div>`
      )).join("");
      ui.chatLog.scrollTop = ui.chatLog.scrollHeight;
    }

    function opponents() {
      if (!state.online.enabled) return state.bots;
      if (state.serverPopulation < BOT_REMOVE_POPULATION) {
        ensureBotCount(BOT_FILLER_COUNT);
        return [...state.remotePlayers, ...state.bots.slice(0, BOT_FILLER_COUNT)];
      }
      state.bots = [];
      return state.remotePlayers;
    }

    function applyOnlineSnapshot(data) {
      if (!data) return;
      if (Array.isArray(data.players)) {
        state.serverPopulation = data.players.length || 1;
        state.remotePlayers = data.players
          .filter((player) => player.onlineId && player.onlineId !== state.online.onlineId)
          .map((player) => ({
            ...player,
            id: String(player.id || "PLAYER"),
            country: String(player.country || "--"),
            floor: Number(player.floor || 0),
            bestFloor: Number(player.bestFloor || player.floor || 0),
            hidden: Boolean(player.hidden),
            shield: Boolean(player.shield),
            shieldUntil: Number(player.shieldUntil || 0),
            stunnedUntil: Number(player.stunnedUntil || 0),
          kills: Number(player.kills || 0),
          gold: Number(player.gold || 0),
          lives: Number(player.lives || 0),
          bestTimeMs: Number(player.bestTimeMs || 0),
          runElapsedMs: Number(player.runElapsedMs || 0)
          }));
        const own = data.players.find((player) => player.onlineId === state.online.onlineId);
        if (own && Number(own.kills || 0) > state.kills) state.kills = Number(own.kills || 0);
        if (own && Number.isFinite(Number(own.gold))) state.gold = Number(own.gold || 0);
        if (own && Number.isFinite(Number(own.lives))) state.lives = Number(own.lives || 0);
        if (own && Number.isFinite(Number(own.bestTimeMs)) && Number(own.bestTimeMs) > 0) state.bestTimeMs = Number(own.bestTimeMs);
        if (own && Number.isFinite(Number(own.floor))) {
          const serverFloor = Math.max(0, Number(own.floor || 0));
          if (serverFloor > state.player.floor) {
            state.player.floor = serverFloor;
            resetFloorHold();
          }
        }
        if (own && Number(own.bestFloor || 0) > state.player.bestFloor) state.player.bestFloor = Number(own.bestFloor || 0);
      }
      if (Array.isArray(data.leaderboard)) {
        state.leaderboard = data.leaderboard.map((player) => ({
          ...player,
          id: String(player.id || "PLAYER"),
          country: String(player.country || "--"),
          floor: Number(player.floor || 0),
          bestFloor: Number(player.bestFloor || player.floor || 0),
          kills: Number(player.kills || 0),
          gold: Number(player.gold || 0),
          lives: Number(player.lives || 0),
          bestTimeMs: Number(player.bestTimeMs || 0),
          record: true
        }));
      }
      if (Array.isArray(data.chat)) {
        state.chat = data.chat.slice(-60);
        renderChat();
      }
    }

    async function postOnline(path, body) {
      if (!state.online.enabled || (!state.online.onlineId && path !== "/api/join")) return null;
      try {
        const response = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (error) {
        state.online.connected = false;
        ui.onlineStatus.textContent = "오프라인";
        return null;
      }
    }

    function syncOnlineState() {
      saveSessionProfile();
      if (!state.online.connected) return;
      postOnline("/api/state", {
        onlineId: state.online.onlineId,
        floor: state.player.floor,
        bestFloor: state.player.bestFloor,
        hidden: state.player.hidden,
        shield: state.player.shield,
        shieldUntil: state.player.shieldUntil,
        stunnedUntil: state.player.stunnedUntil,
        kills: state.kills,
        gold: state.gold,
        lives: state.lives,
        bestTimeMs: state.bestTimeMs,
        runElapsedMs: runElapsedMs()
      });
    }

    function leaveOnline() {
      if (!state.online.enabled || !state.online.onlineId) return;
      const body = JSON.stringify({ onlineId: state.online.onlineId });
      if (navigator.sendBeacon) {
        navigator.sendBeacon("/api/leave", new Blob([body], { type: "application/json" }));
      } else {
        fetch("/api/leave", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body,
          keepalive: true
        }).catch(() => {});
      }
      if (state.online.events) state.online.events.close();
      state.online.connected = false;
    }

    async function connectOnline() {
      if (!state.online.enabled || !state.player.id || state.online.connected) return;
      state.online.playerKey = state.online.playerKey || getPlayerKey();
      const joined = await postOnline("/api/join", {
        onlineId: state.online.onlineId,
        playerKey: state.online.playerKey,
        id: state.player.id,
        country: state.player.country,
        floor: state.player.floor,
        bestFloor: state.player.bestFloor,
        hidden: state.player.hidden,
        shield: state.player.shield,
        shieldUntil: state.player.shieldUntil,
        stunnedUntil: state.player.stunnedUntil,
        kills: state.kills,
        gold: state.gold,
        lives: state.lives,
        bestTimeMs: state.bestTimeMs,
        runElapsedMs: runElapsedMs()
      });
      if (!joined || !joined.onlineId) return;
      state.online.onlineId = joined.onlineId;
      saveSessionProfile();
      state.online.connected = true;
      applyOnlineSnapshot(joined);
      resetFloorHold();
      if (state.online.events) state.online.events.close();
      state.online.events = new EventSource(`/events?id=${encodeURIComponent(state.online.onlineId)}`);
      state.online.events.onmessage = (event) => {
        state.online.connected = true;
        const data = JSON.parse(event.data);
        if (data.type === "attacked" && data.fell) state.lives = 0;
        if (data.type === "attacked" && !data.fell) {
          if (Number.isFinite(Number(data.lives))) state.lives = Number(data.lives);
          state.player.hidden = false;
          resetCombo();
          resetFloorHold();
          showNotice(`${data.reason || "공격"} 목숨 -1 / 남은 목숨 ${state.lives}`);
          addChat("SYSTEM", "--", `${data.reason || "공격"} 목숨 -1 / 남은 목숨 ${state.lives}`);
          syncOnlineState();
          data.type = "state";
        }
        if (data.type === "attacked") {
          respawnAtZero(data.reason || "다른 플레이어에게 당했습니다.");
          syncOnlineState();
        }
        if (data.type === "stunned") {
          if (applyStun(state.player, Number(data.ms || 3000), data.reason || "스턴")) {
            showNotice(`${data.reason || "공격"}에 맞아 스턴!`);
          }
          syncOnlineState();
        }
        applyOnlineSnapshot(data);
      };
      state.online.events.onerror = () => {
        state.online.connected = false;
        ui.onlineStatus.textContent = "재연결 중";
      };
      clearInterval(state.online.syncTimer);
      state.online.syncTimer = setInterval(syncOnlineState, 900);
      showNotice("온라인 서버에 접속했습니다.");
      addChat("SYSTEM", "--", "온라인 모드가 켜졌습니다.");
      syncOnlineState();
    }

    async function attackRemote(target, reason) {
      if (!target || !target.onlineId || !state.online.connected) return;
      const result = await postOnline("/api/attack", {
        onlineId: state.online.onlineId,
        targetId: target.onlineId,
        reason
      });
      if (result && Number.isFinite(Number(result.kills))) state.kills = Number(result.kills);
      if (result && Number.isFinite(Number(result.gold))) {
        const nextGold = Number(result.gold);
        if (nextGold > state.gold) showNotice(`킬 보상 +${KILL_GOLD_REWARD}g (보유 ${nextGold}g)`);
        state.gold = nextGold;
      }
      if (result && result.target) {
        const targetName = result.target.id || target.id || "TARGET";
        if (result.target.fell) {
          showNotice(`${targetName} 0층으로 추락`);
          addChat("SYSTEM", "--", `${targetName} 목숨 0: 0층으로 추락`);
        } else {
          showNotice(`${targetName} 목숨 -1 / 남은 목숨 ${result.target.lives}`);
          addChat("SYSTEM", "--", `${targetName} 목숨 -1 / 남은 목숨 ${result.target.lives}`);
        }
      }
      saveSessionProfile();
    }

    function stunRemote(target, reason, ms = 3000) {
      if (!target || !target.onlineId || !state.online.connected) return;
      postOnline("/api/stun", {
        onlineId: state.online.onlineId,
        targetId: target.onlineId,
        reason,
        ms
      });
    }

    function setRankingCollapsed(collapsed) {
      state.rankingCollapsed = collapsed;
      sessionStorage.setItem("rankingCollapsed", String(collapsed));
      ui.rankingPanel.classList.toggle("collapsed", collapsed);
      ui.rankToggle.textContent = collapsed ? "□" : "−";
      ui.rankToggle.setAttribute("aria-label", collapsed ? "랭킹 열기" : "랭킹 숨김");
      ui.rankToggle.title = collapsed ? "랭킹 열기" : "랭킹 숨김";
      ui.rankingTitle.textContent = collapsed ? "랭킹 보기" : "랭킹";
    }

    function formatDuration(ms) {
      const total = Math.max(0, Math.floor(Number(ms || 0) / 1000));
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const seconds = total % 60;
      return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function runElapsedMs() {
      return Math.max(0, Date.now() - state.runStartedAt);
    }

    function rankingTimeMs(player) {
      const savedTime = Number(player.bestTimeMs || 0);
      if (savedTime > 0) return savedTime;
      const liveTime = Number(player.runElapsedMs || 0);
      if (liveTime > 0 && Number(player.floor || 0) >= Number(player.bestFloor || 0)) return liveTime;
      if (player === state.player && state.player.floor >= state.player.bestFloor) return runElapsedMs();
      return 0;
    }

    function nextGoalInfo() {
      const floor = state.player.floor;
      const goals = [
        { floor: Math.ceil((floor + 1) / 100) * 100, label: "ITEM" },
        { floor: Math.ceil((floor + 1) / LIFE_REWARD_INTERVAL) * LIFE_REWARD_INTERVAL, label: "LIFE" },
        { floor: 500, label: "TITLE" },
        { floor: 1000, label: "TITLE" },
        { floor: 1500, label: "TITLE" },
        { floor: 3000, label: "TITLE" }
      ].filter((goal) => goal.floor > floor).sort((a, b) => a.floor - b.floor);
      const nextFloor = goals[0] ? goals[0].floor : Math.ceil((floor + 1) / 100) * 100;
      const labels = [...new Set(goals.filter((goal) => goal.floor === nextFloor).map((goal) => goal.label))];
      return { floor: nextFloor, label: labels.length ? labels.join("/") : "ITEM" };
    }

    function pulseDanger(power = 0.45) {
      state.flash = Math.max(state.flash, power);
      state.shake = Math.max(state.shake, power);
    }

    function updateBestFloorRecord() {
      if (state.player.floor > state.player.bestFloor) {
        state.player.bestFloor = state.player.floor;
        state.bestTimeMs = runElapsedMs();
      }
    }

    function cooldownText() {
      const left = hideCooldownLeft();
      if (left <= 0) return "숨기 OK";
      const min = Math.floor(left / 60000);
      const sec = Math.ceil((left % 60000) / 1000);
      return `숨기 ${min}:${String(sec).padStart(2, "0")}`;
    }

    function hideCooldownLeft() {
      return Math.max(0, HIDE_COOLDOWN - (Date.now() - state.lastHideAt));
    }

    function canHide() {
      return hideCooldownLeft() <= 0;
    }

    function idleLimitForFloor(floor = state.player.floor) {
      const progress = Math.min(1, Math.max(0, Number(floor || 0) / FLOOR_IDLE_MAX_FLOOR));
      const eased = progress * progress * (3 - 2 * progress);
      return FLOOR_IDLE_START - (FLOOR_IDLE_START - FLOOR_IDLE_END) * eased;
    }

    function resetCombo() {
      state.combo = 0;
      state.comboLastInputAt = 0;
    }

    function touchComboInput() {
      if (state.combo > 0) state.comboLastInputAt = performance.now();
    }

    function addCombo() {
      state.combo += 1;
      state.comboLastInputAt = performance.now();
      if (state.combo % COMBO_GOLD_STEP === 0) {
        state.gold += COMBO_GOLD_REWARD;
        showNotice(`COMBO ${state.combo}: +${COMBO_GOLD_REWARD}G`);
        saveSessionProfile();
      }
      if (state.combo % COMBO_ITEM_STEP === 0) {
        addRandomItem();
        showNotice(`COMBO ${state.combo}: ITEM`);
      }
    }

    function updateComboTimeout() {
      if (state.combo > 0 && performance.now() - state.comboLastInputAt >= COMBO_TIMEOUT) {
        resetCombo();
      }
    }

    function setShield(target) {
      target.shield = true;
      target.shieldUntil = performance.now() + SHIELD_DURATION;
    }

    function clearShield(target) {
      target.shield = false;
      target.shieldUntil = 0;
    }

    function hasShield(target) {
      if (!target.shield) return false;
      if (performance.now() <= (target.shieldUntil || 0)) return true;
      clearShield(target);
      return false;
    }

    function shieldSecondsLeft(target) {
      if (!hasShield(target)) return 0;
      return Math.max(1, Math.ceil((target.shieldUntil - performance.now()) / 1000));
    }

    function addTrail(entity, floor, color) {
      state.trails.push({
        id: entity.id,
        country: entity.country,
        floor,
        color,
        start: performance.now(),
        duration: 360
      });
      state.trails = state.trails.slice(-36);
    }

    function addBoulderEffect(fromFloor, toFloor, hits) {
      state.effects.push({
        type: "boulder",
        fromFloor,
        toFloor,
        hits,
        start: performance.now(),
        duration: 900
      });
    }

    function addMissileEffect(fromFloor, targetFloor, targetId, landedFloor, hit, targetKind = "bot", sourceId = "YOU", targetName = targetId) {
      state.effects.push({
        type: "missile",
        fromFloor,
        targetFloor,
        targetId,
        targetName,
        targetKind,
        sourceId,
        landedFloor,
        hit,
        resolved: false,
        start: performance.now(),
        duration: MISSILE_DURATION
      });
    }

    function resetRunState() {
      state.player.hidden = false;
      clearShield(state.player);
      state.player.stunnedUntil = 0;
      resetCombo();
      state.rewardedMilestones.clear();
      state.rewardedLifeMilestones.clear();
      state.trails = [];
      state.effects = [];
    }

    function addRandomItem() {
      const item = ITEMS[Math.floor(Math.random() * ITEMS.length)];
      const emptyIndex = state.inventory.findIndex((slot) => !slot);
      const index = emptyIndex >= 0 ? emptyIndex : 0;
      state.inventory[index] = item;
      showNotice(`${item.name} 아이템 획득!`);
      addChat("SYSTEM", "--", `${state.player.id || "플레이어"}님이 ${item.name} 아이템을 얻었습니다.`);
      saveSessionProfile();
    }

    function checkItemReward(previousFloor, nextFloor) {
      const previousMilestone = Math.floor(previousFloor / 100);
      const nextMilestone = Math.floor(nextFloor / 100);
      for (let milestone = previousMilestone + 1; milestone <= nextMilestone; milestone++) {
        if (milestone > 0 && !state.rewardedMilestones.has(milestone)) {
          state.rewardedMilestones.add(milestone);
          addRandomItem();
        }
      }
    }

    function checkLifeReward(previousFloor, nextFloor) {
      const previousMilestone = Math.floor(previousFloor / LIFE_REWARD_INTERVAL);
      const nextMilestone = Math.floor(nextFloor / LIFE_REWARD_INTERVAL);
      for (let milestone = previousMilestone + 1; milestone <= nextMilestone; milestone++) {
        const rewardKey = `${LIFE_REWARD_INTERVAL}:${milestone}`;
        if (milestone > 0 && !state.rewardedLifeMilestones.has(rewardKey)) {
          state.rewardedLifeMilestones.add(rewardKey);
          state.lives += 1;
          showNotice(`${milestone * LIFE_REWARD_INTERVAL}층 보너스: 목숨 +1`);
          addChat("SYSTEM", "--", `${state.player.id || "플레이어"}님이 목숨을 1개 얻었습니다.`);
        }
      }
    }

    function applyStun(target, ms, source) {
      if (hasShield(target)) {
        clearShield(target);
        showNotice(`${target.id} 보호막이 ${source}을 막았습니다.`);
        addChat("SYSTEM", "--", `${target.id} 보호막이 ${source}을 막았습니다.`);
        return false;
      }
      target.stunnedUntil = performance.now() + ms;
      if (target === state.player) pulseDanger(0.55);
      return true;
    }

    function nearestLowerSamePositionFloor(fromFloor) {
      const currentX = stairPosition(fromFloor).x;
      for (let floor = fromFloor - 1; floor >= 0; floor--) {
        if (stairPosition(floor).x === currentX) return floor;
      }
      return 0;
    }

    function resolveMissileHit(effect) {
      if (effect.resolved) return;
      effect.resolved = true;
      const target = effect.targetKind === "player"
        ? state.player
        : effect.targetKind === "remote"
          ? state.remotePlayers.find((player) => player.onlineId === effect.targetId)
          : state.bots.find((bot) => bot.id === effect.targetId);
      if (!target) {
        addChat("SYSTEM", "--", `미사일 소멸: ${effect.targetName} 대상 없음`);
        return;
      }

      const targetFloor = target.floor;
      const landedFloor = nearestLowerSamePositionFloor(targetFloor);
      if (effect.targetKind === "remote") {
        attackRemote(target, `${effect.sourceId}의 미사일에 맞아 0층으로 떨어졌습니다.`);
        effect.hit = true;
        effect.landedFloor = landedFloor;
        effect.targetFloor = targetFloor;
        showNotice(`${effect.sourceId} 미사일이 ${target.id}에게 명중!`);
        addChat("SYSTEM", "--", `미사일 명중: ${effect.sourceId} -> ${target.id}`);
        return;
      }
      if (applyStun(target, MISSILE_STUN, "미사일")) {
        target.floor = landedFloor;
        target.hidden = false;
        if (target === state.player) pulseDanger(1);
        effect.hit = true;
        effect.landedFloor = landedFloor;
        effect.targetFloor = targetFloor;
        showNotice(`${effect.sourceId} 미사일이 ${target.id || "플레이어"}에게 명중!`);
        addChat("SYSTEM", "--", `미사일 명중: ${effect.sourceId} -> ${target.id || "플레이어"}, ${targetFloor}층에서 ${landedFloor}층으로 추락`);
      } else {
        effect.hit = false;
        effect.landedFloor = targetFloor;
        effect.targetFloor = targetFloor;
        addChat("SYSTEM", "--", `미사일 방어: ${target.id || "플레이어"} 보호막`);
      }
    }

    function useItem(index) {
      if (state.mode !== "play") return;
      if (performance.now() < state.player.stunnedUntil) {
        showNotice("스턴 중에는 아이템을 쓸 수 없습니다.");
        return;
      }
      const item = state.inventory[index];
      if (!item) {
        showNotice(`${index + 1}번 아이템칸이 비어 있습니다.`);
        return;
      }
      state.inventory[index] = null;
      saveSessionProfile();

      if (item.type === "boulder") {
        const minFloor = Math.max(0, state.player.floor - 100);
        let hits = 0;
        const hitNames = [];
        for (const target of opponents()) {
          if (target.floor >= minFloor && target.floor <= state.player.floor) {
            if (target.onlineId) {
              stunRemote(target, "낙석", BOULDER_STUN);
              hits += 1;
              hitNames.push(target.id);
            } else if (applyStun(target, BOULDER_STUN, "낙석")) {
              hits += 1;
              hitNames.push(target.id);
            }
          }
        }
        addBoulderEffect(state.player.floor, minFloor, hits);
        showNotice(`낙석 사용: ${hits}명 스턴`);
        addChat("SYSTEM", "--", `낙석 발동: ${state.player.floor}층부터 ${minFloor}층까지 타격, ${hits ? hitNames.join(", ") : "명중 없음"}`);
      }

      if (item.type === "warp") {
        const previousFloor = state.player.floor;
        state.player.floor += 100;
        updateBestFloorRecord();
        state.player.hidden = false;
        addTrail(state.player, previousFloor, getComputedStyle(document.documentElement).getPropertyValue("--player").trim());
        state.climbFlash = { floor: state.player.floor, start: performance.now(), duration: 640 };
        checkItemReward(previousFloor, state.player.floor);
        checkLifeReward(previousFloor, state.player.floor);
        showNotice("100층 위로 워프했습니다.");
        syncOnlineState();
      }

      if (item.type === "shield") {
        setShield(state.player);
        showNotice("보호막이 5초간 활성화되었습니다.");
        syncOnlineState();
      }

      if (item.type === "hideReset") {
        state.lastHideAt = -HIDE_COOLDOWN;
        showNotice("숨기 쿨타임이 초기화되었습니다.");
      }

      if (item.type === "missile") {
        const target = opponents()
          .filter((opponent) => opponent.floor === state.player.floor + 1 && !opponent.hidden)
          .sort((a, b) => a.id.localeCompare(b.id))[0];
        if (!target) {
          showNotice("바로 위 층에 미사일 대상이 없습니다.");
          addChat("SYSTEM", "--", "미사일 발동 실패: 바로 위 층 대상 없음");
          saveSessionProfile();
          return;
        }
        addMissileEffect(state.player.floor, target.floor, target.onlineId || target.id, target.floor, false, target.onlineId ? "remote" : "bot", state.player.id || "YOU", target.id);
        showNotice(`${target.id}에게 미사일 발사!`);
        addChat("SYSTEM", "--", `미사일 발사: ${state.player.id || "플레이어"} -> ${target.id}`);
      }
      saveSessionProfile();
    }

    function botUseItem(bot, now) {
      if (bot.easy) return;
      if (!bot.inventory.length || now < bot.nextItemAt || now < bot.stunnedUntil || state.mode !== "play") return;
      const item = bot.inventory.shift();
      bot.nextItemAt = now + 30000 + Math.random() * 45000;
      bot.inventory.push(ITEMS[Math.floor(Math.random() * ITEMS.length)]);

      if (item.type === "boulder") {
        const minFloor = Math.max(0, bot.floor - 100);
        const hit = state.player.floor >= minFloor && state.player.floor <= bot.floor;
        addBoulderEffect(bot.floor, minFloor, hit ? 1 : 0);
        if (hit && applyStun(state.player, BOULDER_STUN, "낙석")) {
          showNotice(`${bot.id} 낙석에 맞아 스턴!`);
          addChat("SYSTEM", "--", `${bot.id} 낙석 발동: 플레이어 스턴`);
        } else {
          addChat("SYSTEM", "--", `${bot.id} 낙석 발동: 명중 없음`);
        }
      }

      if (item.type === "missile") {
        if (state.player.floor !== bot.floor + 1 || state.player.hidden) {
          addChat("SYSTEM", "--", `${bot.id} 미사일 발동 실패: 바로 위 층 대상 없음`);
          return;
        }
        const fromFloor = bot.floor;
        const targetFloor = state.player.floor;
        addMissileEffect(fromFloor, targetFloor, state.player.id || "YOU", targetFloor, false, "player", bot.id);
        showNotice(`${bot.id} 미사일 발사!`);
        addChat("SYSTEM", "--", `${bot.id} 미사일 발사: 플레이어를 향해 날아옵니다.`);
      }

      if (item.type === "shield") {
        setShield(bot);
        addChat("SYSTEM", "--", `${bot.id} 보호막 5초 사용`);
      }

      if (item.type === "warp") {
        const previousFloor = bot.floor;
        bot.floor += 100;
        bot.bestFloor = Math.max(bot.bestFloor || 0, bot.floor);
        bot.hidden = false;
        addTrail(bot, previousFloor, getComputedStyle(document.documentElement).getPropertyValue("--bot").trim());
        addChat("SYSTEM", "--", `${bot.id} 100층 워프`);
      }

      if (item.type === "hideReset") {
        bot.hidden = true;
        bot.nextMoveAt = now + 900 + Math.random() * 1200;
        addChat("SYSTEM", "--", `${bot.id} 은신 준비`);
      }
    }

    function absorbDanger(reason) {
      if (!hasShield(state.player)) return false;
      clearShield(state.player);
      state.player.hidden = false;
      showNotice(`보호막으로 방어했습니다: ${reason}`);
      addChat("SYSTEM", "--", `${state.player.id || "플레이어"}님의 보호막이 공격을 막았습니다.`);
      return true;
    }

    function respawnAtZero(reason) {
      if (absorbDanger(reason)) return;
      if (state.lives > 0) {
        state.lives -= 1;
        resetCombo();
        state.player.hidden = false;
        pulseDanger(0.45);
        showNotice(`목숨을 사용해 버텼습니다. 남은 목숨 ${state.lives}`);
        addChat("SYSTEM", "--", `${state.player.id || "플레이어"}님이 목숨을 사용해 추락을 막았습니다.`);
        syncOnlineState();
        return;
      }
      state.mode = "play";
      state.player.floor = 0;
      state.runStartedAt = Date.now();
      resetFloorHold();
      resetRunState();
      pulseDanger(1);
      state.climbFlash = { floor: -1, start: 0, duration: 0 };
      joinScreen.classList.add("hidden");
      showNotice(reason);
      addChat("SYSTEM", "--", `${state.player.id || "플레이어"}님이 0층에서 다시 시작합니다.`);
      syncOnlineState();
    }

    function loseLifeOrFall(reason) {
      if (absorbDanger(reason)) return false;
      if (state.lives > 0) {
        state.lives -= 1;
        resetCombo();
        state.player.hidden = false;
        pulseDanger(0.5);
        showNotice(`${reason} 목숨 -1 / 남은 목숨 ${state.lives}`);
        addChat("SYSTEM", "--", `${state.player.id || "플레이어"}: ${reason} 목숨 -1`);
        syncOnlineState();
        return true;
      }
      respawnAtZero(`${reason} 목숨이 없어 0층으로 추락했습니다.`);
      return false;
    }

    function resetFloorHold(now = performance.now()) {
      state.floorHold = { floor: state.player.floor, since: now, punished: false };
    }

    function addKillReward() {
      state.gold += KILL_GOLD_REWARD;
      saveSessionProfile();
    }

    function useGoldBoost() {
      if (state.mode !== "play") return;
      if (state.gold < 500) {
        showNotice("500g가 필요합니다.");
        return;
      }
      if (performance.now() < state.player.stunnedUntil) {
        showNotice("스턴 중에는 사용할 수 없습니다.");
        return;
      }
      const previousFloor = state.player.floor;
      state.gold -= 500;
      state.player.floor += 100;
      resetFloorHold();
      updateBestFloorRecord();
      state.player.hidden = false;
      addTrail(state.player, previousFloor, getComputedStyle(document.documentElement).getPropertyValue("--player").trim());
      state.climbFlash = { floor: state.player.floor, start: performance.now(), duration: 640 };
      checkItemReward(previousFloor, state.player.floor);
      checkLifeReward(previousFloor, state.player.floor);
      showNotice("500g 사용: 100층 위에서 시작합니다.");
      syncOnlineState();
    }

    function startGame(id, country) {
      state.mode = "play";
      state.player.id = id;
      state.player.country = country;
      state.player.floor = 0;
      state.player.bestFloor = 0;
      state.runStartedAt = Date.now();
      state.bestTimeMs = 0;
      state.kills = 0;
      state.gold = 0;
      state.lives = 0;
      state.online.playerKey = getPlayerKey();
      resetRunState();
      state.inventory = [null, null, null];
      state.lastHideAt = -HIDE_COOLDOWN;
      resetFloorHold();
      resetBots();
      joinScreen.classList.add("hidden");
      saveSessionProfile();
      showNotice("게임 시작!");
      addChat("SYSTEM", "--", `${id}님이 입장했습니다.`);
      connectOnline();
    }

    function restoreSessionProfile() {
      const saved = sessionStorage.getItem(PROFILE_KEY);
      if (!saved) return false;
      try {
        const profile = JSON.parse(saved);
        if (!profile.id || !profile.country) return false;
        state.mode = "play";
        state.player.id = String(profile.id).slice(0, 14);
        state.player.country = String(profile.country).slice(0, 3);
        state.player.floor = Math.max(0, Number(profile.floor || 0));
        state.player.bestFloor = Math.max(state.player.floor, Number(profile.bestFloor || 0));
        state.runStartedAt = Number.isFinite(Number(profile.runStartedAt)) ? Number(profile.runStartedAt) : Date.now();
        state.bestTimeMs = Number(profile.bestTimeMs || 0);
        state.player.hidden = false;
        state.player.shield = Boolean(profile.shield);
        state.player.shieldUntil = Number(profile.shieldUntil || 0);
        state.player.stunnedUntil = Number(profile.stunnedUntil || 0);
        state.lastHideAt = Number.isFinite(Number(profile.lastHideAt)) ? Number(profile.lastHideAt) : -HIDE_COOLDOWN;
        state.inventory = Array.isArray(profile.inventory) ? profile.inventory.slice(0, 3).map(itemFromType) : [null, null, null];
        while (state.inventory.length < 3) state.inventory.push(null);
        state.testItemCursor = Number(profile.testItemCursor || 0);
        state.kills = Number(profile.kills || 0);
        state.gold = Number(profile.gold || 0);
        state.lives = Number(profile.lives || 0);
        state.rewardedMilestones = new Set(Array.isArray(profile.rewardedMilestones) ? profile.rewardedMilestones : []);
        state.rewardedLifeMilestones = new Set(Array.isArray(profile.rewardedLifeMilestones) ? profile.rewardedLifeMilestones : []);
        state.online.playerKey = String(profile.playerKey || "") || getPlayerKey();
        state.online.onlineId = String(profile.onlineId || "");
        resetCombo();
        state.trails = [];
        state.effects = [];
        state.climbFlash = { floor: -1, start: 0, duration: 0 };
        resetFloorHold();
        if (canHide()) {
          state.lastHideAt = Date.now();
          state.player.hidden = true;
          showNotice(`${state.player.floor}층에서 자동 은신했습니다.`);
        } else {
          showNotice(`${state.player.floor}층에서 다시 시작합니다.`);
        }
        joinScreen.classList.add("hidden");
        addChat("SYSTEM", "--", `${state.player.id}님이 세션으로 재입장했습니다.`);
        saveSessionProfile();
        connectOnline();
        return true;
      } catch (error) {
        sessionStorage.removeItem(PROFILE_KEY);
        return false;
      }
    }

    function knockDownBot(bot, reason) {
      bot.floor = 0;
      bot.hidden = false;
      bot.stunnedUntil = performance.now() + 1800;
      state.kills += 1;
      addKillReward();
      showNotice(`${bot.id} ${reason} / +${KILL_GOLD_REWARD}g`);
      addChat("SYSTEM", "--", `${bot.id} ${reason}`);
      saveSessionProfile();
    }

    function tryHide() {
      if (state.mode !== "play") return;
      if (performance.now() < state.player.stunnedUntil) {
        showNotice("스턴 중입니다.");
        return;
      }
      if (state.player.hidden) {
        showNotice("이미 숨어 있습니다.");
        return;
      }
      if (!canHide()) {
        showNotice(`${cooldownText()} 후 다시 숨을 수 있습니다.`);
        return;
      }
      state.lastHideAt = Date.now();
      state.player.hidden = true;
      resetFloorHold();
      showNotice(`${state.player.floor}층에 숨었습니다.`);
      syncOnlineState();
    }

    function knockDownOpponent(victim, reason) {
      if (!victim) return;
      if (victim.onlineId) {
        showNotice(`${victim.id} ${reason}`);
        addChat("SYSTEM", "--", `${victim.id} ${reason}`);
        attackRemote(victim, `${state.player.id || "플레이어"}에게 ${reason}`);
        return;
      }
      knockDownBot(victim, reason);
    }

    function climb(inputDir) {
      if (state.mode !== "play") return;
      if (performance.now() < state.player.stunnedUntil) {
        showNotice("스턴 중입니다.");
        return;
      }
      const expected = directionForNextFloor(state.player.floor);
      const wasHidden = state.player.hidden;
      const previousFloor = state.player.floor;

      if (expected !== inputDir) {
        respawnAtZero("계단 방향을 놓쳐 0층으로 떨어졌습니다.");
        return;
      }

      state.player.floor += 1;
      resetFloorHold();
      updateBestFloorRecord();
      state.player.hidden = false;
      addCombo();
      state.jump = { start: performance.now(), duration: JUMP_DURATION };
      playFootstep();
      addTrail(state.player, previousFloor, getComputedStyle(document.documentElement).getPropertyValue("--player").trim());
      state.climbFlash = { floor: state.player.floor, start: performance.now(), duration: 520 };
      checkItemReward(previousFloor, state.player.floor);
      checkLifeReward(previousFloor, state.player.floor);
      syncOnlineState();

      if (isRestFloor(state.player.floor)) {
        showNotice(`${state.player.floor}층 휴식공간입니다.`);
      } else if (wasHidden) {
        const victim = opponents().find((opponent) => Math.abs(opponent.floor - state.player.floor) <= 1 && !opponent.hidden);
        if (victim) knockDownOpponent(victim, "기습 성공으로 0층 추락");
        else showNotice("기습 이동!");
      } else {
        const victim = opponents().find((opponent) => opponent.floor === state.player.floor && !opponent.hidden);
        if (victim) knockDownOpponent(victim, "따라잡혀 0층 추락");
      }
    }

    function autoClimbStep() {
      if (!state.autoClimb || state.mode !== "play") return;
      if (performance.now() < state.player.stunnedUntil) return;
      touchComboInput();
      climb(directionForNextFloor(state.player.floor));
    }

    function setAutoClimb(enabled) {
      state.autoClimb = false;
      if (state.autoTimer) {
        clearInterval(state.autoTimer);
        state.autoTimer = 0;
      }
      if (state.autoClimb) {
        autoClimbStep();
        state.autoTimer = setInterval(autoClimbStep, AUTO_CLIMB_INTERVAL);
        showNotice("테스트 자동등반 ON");
      } else {
        showNotice("테스트 자동등반 OFF");
      }
      renderHud();
    }

    function handleKey(event) {
      if (document.activeElement === chatInput) return;
      if (event.repeat) {
        const repeatCode = event.code || event.key;
        if (["ArrowDown", "ArrowRight", "ArrowUp", "ArrowLeft", "Down", "Right", "Up", "Left", "Digit1", "Digit2", "Digit3", "Numpad1", "Numpad2", "Numpad3"].includes(repeatCode)) {
          event.preventDefault();
          return;
        }
      }
      const key = event.key || event.code;
      const code = event.code || event.key;
      if (["Digit1", "Digit2", "Digit3", "Numpad1", "Numpad2", "Numpad3"].includes(event.code)) {
        event.preventDefault();
        touchComboInput();
        const index = Number(event.code.slice(-1)) - 1;
        useItem(index);
        return;
      }
      const isDown = key === "ArrowDown" || code === "ArrowDown" || key === "Down" || code === "Down";
      const isRight = key === "ArrowRight" || code === "ArrowRight" || key === "Right" || code === "Right";
      const isUp = key === "ArrowUp" || code === "ArrowUp" || key === "Up" || code === "Up";
      const isLeft = key === "ArrowLeft" || code === "ArrowLeft" || key === "Left" || code === "Left";
      if (!isDown && !isRight && !isUp && !isLeft) return;
      event.preventDefault();
      touchComboInput();
      if (isDown) tryHide();
      else if (isRight) climb("R");
      else if (isUp) climb("U");
      else climb("L");
    }

    function handleMobileControl(event) {
      event.preventDefault();
      const button = event.currentTarget;
      touchComboInput();
      if (button.dataset.mobileItem !== undefined) {
        useItem(Number(button.dataset.mobileItem));
        return;
      }
      const action = button.dataset.mobileAction;
      if (action === "hide") tryHide();
      if (action === "left") climb("L");
      if (action === "up") climb("U");
      if (action === "right") climb("R");
    }

    function handleMobileItemSlot(event) {
      event.preventDefault();
      const index = ui.itemSlots.indexOf(event.currentTarget);
      if (index < 0) return;
      touchComboInput();
      useItem(index);
    }

    function updateBots(now) {
      if (state.mode !== "play") return;
      if (state.online.enabled && state.serverPopulation >= BOT_REMOVE_POPULATION) {
        state.bots = [];
        return;
      }
      if (state.online.enabled) ensureBotCount(BOT_FILLER_COUNT);
      for (const bot of state.bots) {
        const nearPlayer = Math.abs(bot.floor - state.player.floor) <= 45;
        if (!bot.easy && (nearPlayer || Math.random() < 0.01)) botUseItem(bot, now);
        if (now < bot.nextMoveAt || now < bot.stunnedUntil) continue;
        const delay = bot.baseSpeed * bot.rhythm + Math.random() * 720;
        bot.nextMoveAt = now + delay;

        if (Math.random() < bot.hesitation) {
          bot.nextMoveAt += 450 + Math.random() * 950;
          continue;
        }

        if (Math.random() < 0.045 && !bot.hidden) {
          bot.hidden = true;
          bot.nextMoveAt += 900 + Math.random() * 1300;
          continue;
        }

        const previousFloor = bot.floor;
        if (Math.random() < bot.mistake) {
          bot.floor = Math.max(0, bot.floor - 1);
          bot.hidden = false;
          addTrail(bot, previousFloor, getComputedStyle(document.documentElement).getPropertyValue("--bot").trim());
          continue;
        }
        bot.floor += 1;
        bot.bestFloor = Math.max(bot.bestFloor || 0, bot.floor);
        bot.jump = { start: now, duration: JUMP_DURATION };
        addTrail(bot, previousFloor, getComputedStyle(document.documentElement).getPropertyValue("--bot").trim());
        const cameOut = bot.hidden;
        bot.hidden = false;

        if (isRestFloor(state.player.floor)) {
          continue;
        }

        if (cameOut && Math.abs(bot.floor - state.player.floor) <= 1 && !state.player.hidden) {
          loseLifeOrFall(`${bot.id} 기습`);
          break;
        }
        if (!cameOut && bot.floor === state.player.floor && !state.player.hidden) {
          loseLifeOrFall(`${bot.id} 추격`);
          break;
        }

        if (cameOut && Math.abs(bot.floor - state.player.floor) <= 1 && !state.player.hidden) {
          respawnAtZero(`${bot.id}의 기습을 받아 0층으로 떨어졌습니다.`);
          break;
        } else if (bot.floor === state.player.floor && !state.player.hidden) {
          respawnAtZero(`${bot.id}에게 따라잡혀 0층으로 떨어졌습니다.`);
          break;
        }

        if (bot.floor > state.player.floor + 55) bot.floor = Math.max(0, state.player.floor - 6);
        if (bot.floor < state.player.floor - 24) {
          bot.floor = state.player.floor + 8 + Math.floor(Math.random() * 24);
          bot.hidden = false;
          bot.nextMoveAt = now + 650 + Math.random() * 1300;
        }
      }
    }

    function updateFloorHold(now) {
      if (state.mode !== "play") return;
      if (state.player.hidden || now < state.player.stunnedUntil) {
        resetFloorHold(now);
        return;
      }
      if (state.floorHold.floor !== state.player.floor) {
        resetFloorHold(now);
        return;
      }
      if (!state.floorHold.punished && now - state.floorHold.since >= idleLimitForFloor()) {
        state.floorHold.punished = true;
        loseLifeOrFall(`${state.player.floor}층에서 3초 이상 머물렀습니다.`);
      }
    }

    function screenPosition(floor, focusFloor, width, height) {
      const pos = stairPosition(floor);
      const focus = stairPosition(focusFloor);
      return {
        x: width * 0.5 + (pos.x - focus.x) * STEP_X,
        y: height * 0.68 - (pos.y - focus.y) * STEP_Y
      };
    }

    function drawBar(x, y, active, glowAmount, rest) {
      ctx.save();
      ctx.translate(x, y);
      const width = rest ? BAR_W * 2.9 : BAR_W;
      if (glowAmount > 0) {
        ctx.shadowColor = "#fff0b8";
        ctx.shadowBlur = 8 + glowAmount * 24;
      }
      ctx.fillStyle = rest ? "#4c8f78" : glowAmount > 0 ? `rgba(255, 243, 176, ${0.34 + glowAmount * 0.66})` : active ? varColor("--bar-active") : varColor("--bar");
      ctx.strokeStyle = rest ? "#92e2c2" : glowAmount > 0 || active ? "#ffe1a4" : "rgba(255,255,255,0.18)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(-width / 2, -BAR_H / 2, width, BAR_H, 4);
      ctx.fill();
      ctx.stroke();
      if (glowAmount > 0) {
        ctx.globalAlpha = 0.28 * glowAmount;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.roundRect(-width / 2 - 8, -BAR_H / 2 - 5, width + 16, BAR_H + 10, 7);
        ctx.fill();
      }
      if (rest) {
        ctx.globalAlpha = 0.92;
        ctx.fillStyle = "#d8fff0";
        ctx.font = "900 11px system-ui";
        ctx.textAlign = "center";
        ctx.fillText("REST", 0, -10);
      }
      ctx.restore();
    }

    function drawRunner(entity, x, y, color, alpha = 1, selfView = false) {
      if (entity.hidden && !selfView) return;
      const label = `${displayName(entity)} ${entity.floor}F`;
      ctx.save();
      ctx.translate(x, y - 22);
      const visibleAlpha = entity.hidden && selfView ? Math.min(alpha, 0.42) : alpha;
      ctx.globalAlpha = visibleAlpha;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(-16, -16, 32, 32, 7);
      ctx.fill();
      if (hasShield(entity)) {
        ctx.strokeStyle = "#fff3b0";
        ctx.lineWidth = 3;
        ctx.strokeRect(-21, -21, 42, 42);
      }
      ctx.globalAlpha = visibleAlpha;
      ctx.fillStyle = varColor("--text");
      ctx.font = "800 12px system-ui";
      ctx.textAlign = "center";
      if (visibleAlpha > 0.55) ctx.fillText(performance.now() < (entity.stunnedUntil || 0) ? "STUN" : label, 0, -24);
      ctx.restore();
    }

    function drawEffects(focus, width, height, now) {
      state.effects = state.effects.filter((effect) => now - effect.start < effect.duration);
      for (const effect of state.effects) {
        const t = Math.max(0, Math.min(1, (now - effect.start) / effect.duration));

        if (effect.type === "boulder") {
          const startP = screenPosition(effect.fromFloor, focus, width, height);
          const endP = screenPosition(effect.toFloor, focus, width, height);
          const y = startP.y + (endP.y - startP.y) * t;
          const pulse = Math.sin(t * Math.PI);
          ctx.save();
          ctx.globalAlpha = 0.18 + pulse * 0.42;
          ctx.strokeStyle = "#9a9fa8";
          ctx.lineWidth = 10;
          ctx.beginPath();
          ctx.moveTo(startP.x, startP.y - 80);
          ctx.lineTo(endP.x, endP.y + 20);
          ctx.stroke();
          ctx.globalAlpha = 1;
          ctx.fillStyle = "#6b7078";
          ctx.strokeStyle = "#d8dde5";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(startP.x, y - 42, 18 + pulse * 7, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#f5f1e8";
          ctx.font = "900 12px system-ui";
          ctx.textAlign = "center";
          ctx.fillText(t < 0.35 ? "WARNING" : `낙석 ${effect.hits}명`, startP.x, y - 72);
          ctx.restore();
        }

        if (effect.type === "missile") {
          const startP = screenPosition(effect.fromFloor, focus, width, height);
          const liveTarget = effect.targetKind === "player"
            ? state.player
            : effect.targetKind === "remote"
              ? state.remotePlayers.find((player) => player.onlineId === effect.targetId)
              : state.bots.find((bot) => bot.id === effect.targetId);
          const liveTargetFloor = liveTarget ? liveTarget.floor : effect.targetFloor;
          const targetP = screenPosition(liveTargetFloor, focus, width, height);
          const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
          const x = startP.x + (targetP.x - startP.x) * eased;
          const y = startP.y + (targetP.y - startP.y) * eased - Math.sin(eased * Math.PI) * 58;
          if (t >= MISSILE_HIT_AT && !effect.resolved) resolveMissileHit(effect);
          ctx.save();
          const rocketColor = effect.resolved && !effect.hit ? "#aeb6c4" : "#ff626f";
          const angle = Math.atan2(targetP.y - startP.y, targetP.x - startP.x);
          const pulse = 0.7 + Math.sin(t * Math.PI * 8) * 0.3;
          ctx.translate(x, y);
          ctx.rotate(angle);
          ctx.shadowColor = rocketColor;
          ctx.shadowBlur = 14 * pulse;
          ctx.fillStyle = effect.resolved && !effect.hit ? "#aeb6c4" : "#ff626f";
          ctx.beginPath();
          ctx.roundRect(-20, -8, 40, 16, 8);
          ctx.fill();
          ctx.fillStyle = "#fff3b0";
          ctx.beginPath();
          ctx.moveTo(-24, 0);
          ctx.lineTo(-38 - pulse * 8, -7);
          ctx.lineTo(-34 - pulse * 10, 0);
          ctx.lineTo(-38 - pulse * 8, 7);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "#f5f1e8";
          ctx.beginPath();
          ctx.arc(11, 0, 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
          if (t > 0.72) {
            ctx.save();
            const boom = (t - 0.72) / 0.28;
            ctx.globalAlpha = Math.max(0, 1 - boom);
            ctx.strokeStyle = "#fff3b0";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(targetP.x, targetP.y - 24, 16 + boom * 42, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = "#f5f1e8";
            ctx.font = "900 12px system-ui";
            ctx.textAlign = "center";
            ctx.fillText(effect.resolved ? (effect.hit ? `${effect.targetName} 명중` : "방어/실패") : "접근 중", targetP.x, targetP.y - 72);
            ctx.restore();
          }
        }
      }
    }

    function varColor(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function renderGame() {
      const rect = canvas.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;
      ctx.clearRect(0, 0, width, height);
      ctx.save();
      if (state.shake > 0) {
        const amount = 9 * state.shake;
        ctx.translate((Math.random() - 0.5) * amount, (Math.random() - 0.5) * amount);
        state.shake = Math.max(0, state.shake - 0.035);
      }

      if (state.flash > 0) {
        ctx.fillStyle = `rgba(255, 100, 111, ${state.flash * 0.28})`;
        ctx.fillRect(0, 0, width, height);
        state.flash = Math.max(0, state.flash - 0.025);
      }

      const focus = state.mode === "play" ? state.player.floor : 0;
      const start = Math.max(0, focus - 12);
      const end = focus + 42;
      const now = performance.now();
      for (let floor = start; floor <= end; floor++) {
        const p = screenPosition(floor, focus, width, height);
        let glowAmount = 0;
        if (floor === state.climbFlash.floor && state.climbFlash.duration > 0) {
          const t = (now - state.climbFlash.start) / state.climbFlash.duration;
          if (t >= 0 && t <= 1) glowAmount = Math.sin(t * Math.PI);
        }
        drawBar(p.x, p.y, floor === focus, glowAmount, isRestFloor(floor));
      }

      state.trails = state.trails.filter((trail) => now - trail.start < trail.duration);
      for (const trail of state.trails) {
        if (Math.abs(trail.floor - focus) > 30) continue;
        const age = (now - trail.start) / trail.duration;
        const p = screenPosition(trail.floor, focus, width, height);
        drawRunner({ id: trail.id, country: trail.country || "--", floor: trail.floor, hidden: false, stunnedUntil: 0 }, p.x, p.y, trail.color, (1 - age) * 0.34);
      }

      for (const opponent of opponents()) {
        if (Math.abs(opponent.floor - focus) > 30) continue;
        const p = screenPosition(opponent.floor, focus, width, height);
        let opponentJump = 0;
        if (opponent.jump && opponent.jump.duration > 0) {
          const jumpT = (now - opponent.jump.start) / opponent.jump.duration;
          if (jumpT >= 0 && jumpT <= 1) opponentJump = Math.sin(jumpT * Math.PI) * 14;
        }
        drawRunner(opponent, p.x, p.y - opponentJump, varColor("--bot"));
      }

      const pp = screenPosition(state.player.floor, focus, width, height);
      const playerLabel = state.player.id ? state.player : { id: "YOU", floor: 0, hidden: false };
      let jumpOffset = 0;
      if (state.jump.duration > 0) {
        const jumpT = (now - state.jump.start) / state.jump.duration;
        if (jumpT >= 0 && jumpT <= 1) jumpOffset = Math.sin(jumpT * Math.PI) * 18;
      }
      drawRunner(playerLabel, pp.x, pp.y - jumpOffset, varColor("--player"), 1, true);

      drawEffects(focus, width, height, now);
      ctx.restore();
    }

    function renderHud() {
      updateComboTimeout();
      ui.rankingPanel.classList.toggle("collapsed", state.rankingCollapsed);
      ui.floor.textContent = `${state.player.floor}F`;
      ui.combo.textContent = `COMBO x${state.combo}`;
      ui.combo.classList.toggle("active", state.combo > 0);
      ui.playerLabel.textContent = state.player.id ? `${displayName(state.player)} / ${state.player.country}` : "ID 없음";
      ui.block.textContent = `${Math.floor(state.player.floor / SEGMENT_SIZE) + 1}구간`;
      ui.kills.textContent = `킬 ${state.kills}`;
      ui.gold.textContent = `${state.gold}g`;
      ui.lives.textContent = `목숨 ${state.lives}`;
      ui.boostBtn.disabled = state.gold < 500 || state.mode !== "play";
      ui.boostBtn.textContent = state.gold >= 500 ? "100층 위 시작 - 500g" : `100층 위 시작 - ${state.gold}/500g`;
      ui.onlineStatus.textContent = state.online.connected ? `온라인 ${state.remotePlayers.length + 1}명` : state.online.enabled ? "서버 연결 중" : "오프라인";
      const stunned = Math.max(0, state.player.stunnedUntil - performance.now());
      const shieldLeft = shieldSecondsLeft(state.player);
      ui.cooldown.textContent = stunned > 0 ? `스턴 ${Math.ceil(stunned / 1000)}초` : state.player.hidden ? "은신 중" : shieldLeft > 0 ? `보호막 ${shieldLeft}초` : cooldownText();

      ui.playerLabel.textContent = state.player.id ? `ID ${displayName(state.player)}` : "ID -";
      ui.block.textContent = `${Math.floor(state.player.floor / SEGMENT_SIZE) + 1}구간`;
      ui.kills.textContent = `K ${state.kills}`;
      ui.gold.textContent = `G ${state.gold}`;
      ui.lives.textContent = `L ${state.lives}`;
      ui.boostBtn.innerHTML = `<span class="boost-main">100F UP!</span><span class="boost-cost">${state.gold}/500G</span>`;
      ui.autoBtn.disabled = state.mode !== "play";
      ui.autoBtn.classList.toggle("active", state.autoClimb);
      ui.autoBtn.textContent = state.autoClimb ? "AUTO ON" : "AUTO OFF";
      ui.cooldown.textContent = stunned > 0 ? `ST ${Math.ceil(stunned / 1000)}s` : state.player.hidden ? "HIDE ON" : shieldLeft > 0 ? `SH ${shieldLeft}s` : canHide() ? "HIDE OK" : `HIDE ${Math.ceil(hideCooldownLeft() / 1000)}s`;
      const nextGoal = nextGoalInfo();
      ui.nextGoal.innerHTML = `NEXT<span>${nextGoal.floor}F ${nextGoal.label}</span>`;
      const idleLimit = idleLimitForFloor();
      const idleLeft = state.player.hidden || stunned > 0 ? idleLimit : Math.max(0, idleLimit - (performance.now() - state.floorHold.since));
      const idleProgress = state.player.hidden || stunned > 0 ? 0 : Math.min(1, Math.max(0, 1 - idleLeft / idleLimit));
      ui.idleTimer.classList.toggle("danger", idleLeft <= 1200 && !state.player.hidden && stunned <= 0);
      ui.idleTimer.querySelector(".idle-label").textContent = state.player.hidden ? "HIDE" : stunned > 0 ? "STUN" : "STAY";
      ui.idleTimer.querySelector(".idle-value").textContent = `${(idleLeft / 1000).toFixed(1)}s`;
      ui.mobileIdleFill.style.width = `${Math.round(idleProgress * 100)}%`;

      state.inventory.forEach((item, index) => {
        ui.itemSlots[index].classList.toggle("ready", Boolean(item));
        const fullName = item ? item.name : "EMPTY";
        const shortName = item ? item.short : "-";
        ui.itemSlots[index].innerHTML = `<span class="item-key">${index + 1}</span><span class="item-name">${escapeHtml(fullName)}</span><span class="item-short">${escapeHtml(shortName)}</span>`;
      });

      const rankMap = new Map();
      for (const player of [...state.leaderboard, state.player, ...opponents()]) {
        if (!player.id) continue;
        const key = `${player.country || "--"}:${player.id}`;
        const row = { ...player, bestFloor: Math.max(Number(player.bestFloor || 0), Number(player.floor || 0)), bestTimeMs: Number(player.bestTimeMs || 0), runElapsedMs: Number(player.runElapsedMs || 0) };
        const previous = rankMap.get(key);
        if (!previous || row.bestFloor > previous.bestFloor || (row.bestFloor === previous.bestFloor && row.bestTimeMs > 0 && (!previous.bestTimeMs || row.bestTimeMs < previous.bestTimeMs))) rankMap.set(key, row);
      }
      const players = [...rankMap.values()].sort((a, b) => b.bestFloor - a.bestFloor);
      const liveLeader = [state.player, ...opponents()]
        .filter((player) => player.id)
        .sort((a, b) => Number(b.floor || 0) - Number(a.floor || 0))[0];
      ui.liveLeader.textContent = liveLeader ? `LIVE #1 ${displayName(liveLeader)} ${liveLeader.floor}F` : "LIVE #1 -";

      ui.rankRows.innerHTML = players.map((player, index) => (
        `<div class="rank-row">
          <span>${index === 0 ? "👑" : index + 1}</span>
          <span class="rank-id">${escapeHtml(displayName(player))}</span>
          <span>${escapeHtml(player.country)}</span>
          <span class="rank-floor">${player.bestFloor}F</span>
          <span class="rank-time">${formatDuration(rankingTimeMs(player))}</span>
        </div>`
      )).join("");

      if (performance.now() > state.noticeUntil) {
        ui.notice.innerHTML = "<strong>조작</strong><br>&larr; 왼쪽 위 계단 / &uarr; 머리 위 계단 / &rarr; 오른쪽 계단 / &darr; 숨기 / 1,2,3 아이템";
      }
    }

    function tick(now) {
      updateBots(now);
      updateFloorHold(now);
      renderGame();
      renderHud();
      requestAnimationFrame(tick);
    }

    joinForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const id = document.getElementById("playerId").value.trim().replace(/\s+/g, "_");
      const country = document.getElementById("country").value;
      if (!id) return;
      startGame(id, country);
    });

    chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = chatInput.value.trim();
      if (!text || !state.player.id) return;
      if (state.online.connected) {
        postOnline("/api/chat", { onlineId: state.online.onlineId, text });
      } else {
        addChat(state.player.id, state.player.country, text);
      }
      chatInput.value = "";
      if (window.matchMedia("(max-width: 760px)").matches) ui.chatPanel.classList.remove("expanded");
    });

    ui.chatPanel.addEventListener("click", () => {
      if (!window.matchMedia("(max-width: 760px)").matches) return;
      ui.chatPanel.classList.add("expanded");
      setTimeout(() => chatInput.focus(), 0);
    });

    chatForm.addEventListener("click", (event) => {
      event.stopPropagation();
    });

      ui.rankToggle.addEventListener("click", () => {
      setRankingCollapsed(!state.rankingCollapsed);
    });

    ui.boostBtn.addEventListener("click", useGoldBoost);
    ui.autoBtn.addEventListener("click", () => setAutoClimb(!state.autoClimb));

    resetBots();
    restoreSessionProfile();
    resize();
    renderChat();
    if (window.matchMedia("(max-width: 760px)").matches) {
      state.rankingCollapsed = false;
    }
    setRankingCollapsed(state.rankingCollapsed);
    renderHud();
    window.addEventListener("resize", resize);
    window.addEventListener("keydown", handleKey, { passive: false, capture: true });
    window.addEventListener("pagehide", leaveOnline);
    document.querySelectorAll("[data-mobile-action]").forEach((button) => {
      button.addEventListener("pointerdown", handleMobileControl, { passive: false });
    });
    ui.itemSlots.forEach((slot) => {
      slot.addEventListener("pointerdown", handleMobileItemSlot, { passive: false });
    });
    requestAnimationFrame(tick);
  </script>
</body>
</html>
